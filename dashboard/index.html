<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hivemind · Claude Code NOC</title>
<style>
  /* ── Design tokens (replaces the Claude.ai design system the prototype assumed) ── */
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4ef;
    --color-border-tertiary: #e7e5df;
    --color-border-secondary: #d4d1c8;
    --color-text-primary: #1f1d1a;
    --color-text-secondary: #595650;
    --color-text-tertiary: #9b9890;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "Cascadia Code", "Consolas", ui-monospace, SFMono-Regular, Menlo, monospace;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;

    /* avatar palette */
    --skin: #FDBCB4; --skin-dark: #E8947A;
    --hair: #3C2A1E; --shirt-blue: #3B82F6; --shirt-green: #10B981;
    --shirt-purple: #8B5CF6; --shirt-orange: #F59E0B;
    --desk: #92400E; --desk-light: #B45309;
    --screen: #0F172A; --screen-glow: #38BDF8;
    --kbd: #374151; --kbd-key: #4B5563;
    --phone: #1F2937; --bubble: #E5E7EB;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #211f1c;
      --color-background-secondary: #1a1815;
      --color-border-tertiary: #353230;
      --color-border-secondary: #4a4642;
      --color-text-primary: #ece9e3;
      --color-text-secondary: #b3afa7;
      --color-text-tertiary: #807c74;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: var(--font-sans); background: var(--color-background-secondary); color: var(--color-text-primary); }

  .dashboard {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
  }

  .top-bar-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #10B981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .spawn-btn {
    font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary); cursor: pointer;
    transition: background 0.15s;
  }
  .spawn-btn:hover { background: var(--color-background-secondary); }

  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }

  .agent-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 14px 12px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 220px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .agent-card.active { border-color: var(--color-border-secondary); }

  .agent-name {
    font-size: 12px; font-weight: 500; color: var(--color-text-secondary);
    letter-spacing: 0.03em;
  }

  .state-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 99px;
    font-weight: 500;
    transition: background 0.3s, color 0.3s;
  }

  .canvas-wrap { position: relative; width: 120px; height: 100px; }

  canvas.agent-canvas {
    display: block; width: 120px; height: 100px;
    image-rendering: pixelated;
  }

  .log-area {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 8px 10px;
    width: 100%;
    height: 48px;
    overflow: hidden;
    position: relative;
  }

  .log-scroll { position: absolute; width: calc(100% - 20px); }
  .log-line {
    font-size: 10px; color: var(--color-text-secondary);
    font-family: var(--font-mono);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.6;
  }
  .log-line.new { color: var(--color-text-primary); }

  .state-controls {
    display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
  }
  .state-btn {
    font-size: 10px; padding: 2px 7px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary); cursor: pointer;
    transition: all 0.15s;
  }
  .state-btn:hover, .state-btn.active-btn {
    background: var(--color-background-primary);
    border-color: var(--color-border-secondary);
    color: var(--color-text-primary);
  }

  .remove-btn {
    position: absolute; top: 6px; right: 8px;
    font-size: 14px; color: var(--color-text-tertiary);
    cursor: pointer; line-height: 1; background: none; border: none;
    padding: 0;
  }
  .remove-btn:hover { color: var(--color-text-secondary); }

  .legend {
    display: flex; flex-wrap: wrap; gap: 8px 16px;
    padding: 10px 14px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* Live mode: the bridge drives state; hide manual demo controls. */
  body.live .state-controls,
  body.live .remove-btn,
  body.live .spawn-btn { display: none; }
</style>
</head>
<body>

<div class="dashboard">
  <div class="top-bar">
    <div class="top-bar-title">
      <div class="dot"></div>
      Hivemind · Agent NOC
    </div>
    <button class="spawn-btn" onclick="spawnAgent()">+ Spawn agent</button>
  </div>

  <div class="agents-grid" id="agentsGrid"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#6366F1"></div> Thinking</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div> Coding</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div> Spawning</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3B82F6"></div> Reading</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div> Error</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8B5CF6"></div> Testing</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6B7280"></div> Idle</div>
  </div>
</div>

<script src="src/themes.js"></script>
<script src="src/layout.js"></script>
<script src="src/abstract-avatar.js"></script>
<script src="src/gif-avatar.js"></script>
<script src="src/hierarchy.js"></script>
<script src="src/projects.js"></script>
<script>
const STATES = {
  idle:     { label: 'Idle',     color: '#6B7280', bg: '#F3F4F6', text: '#374151' },
  thinking: { label: 'Thinking', color: '#6366F1', bg: '#EEF2FF', text: '#4338CA' },
  coding:   { label: 'Coding',   color: '#10B981', bg: '#ECFDF5', text: '#065F46' },
  spawning: { label: 'Spawning', color: '#F59E0B', bg: '#FFFBEB', text: '#92400E' },
  reading:  { label: 'Reading',  color: '#3B82F6', bg: '#EFF6FF', text: '#1E40AF' },
  error:    { label: 'Error',    color: '#EF4444', bg: '#FEF2F2', text: '#991B1B' },
  testing:  { label: 'Testing',  color: '#8B5CF6', bg: '#F5F3FF', text: '#5B21B6' },
};

const SHIRTS = ['#3B82F6','#10B981','#8B5CF6','#F59E0B','#EF4444','#EC4899','#06B6D4'];
const NAMES = ['Orion','Nova','Axon','Zephyr','Pixel','Byte','Flux','Echo','Volt','Kira'];
const LOG_MSGS = {
  idle:     ['...','waiting for task','standing by','ready'],
  thinking: ['analyzing context...','planning approach...','evaluating options...','reasoning through...','considering edge cases...'],
  coding:   ['writing tests...','refactoring module...','fixing lint errors...','implementing handler...','updating deps...','adding type hints...'],
  spawning: ['pinging subagent...','delegating task...','spawning worker...','messaging agent #2...','routing subtask...'],
  reading:  ['parsing README...','scanning codebase...','loading file tree...','reading docs...','indexing symbols...'],
  error:    ['undefined is not a function','segfault at 0x0','unexpected token','type mismatch','build failed'],
  testing:  ['running test suite...','checking assertions...','validating output...','coverage: 82%','diffing snapshots...'],
};

let agents = [];
let agentCounter = 0;

function spawnAgent() {
  if (agents.length >= 6) return;
  const id = agentCounter++;
  const shirt = SHIRTS[id % SHIRTS.length];
  const name = NAMES[id % NAMES.length] + (id >= NAMES.length ? ` ${Math.floor(id/NAMES.length)+1}` : '');
  const agent = { id, name, shirt, state: 'idle', tick: 0, frame: 0, logLines: [] };
  agents.push(agent);
  renderGrid();
  setTimeout(() => { agent.state = 'thinking'; updateAgentCard(agent); }, 600);
}

function removeAgent(id) {
  agents = agents.filter(a => a.id !== id);
  renderGrid();
}

function setAgentState(agent, state) {
  agent.state = state;
  addLog(agent, state);
  updateAgentCard(agent);
}

function addLog(agent, state) {
  const msgs = LOG_MSGS[state];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  agent.logLines.unshift(msg);
  if (agent.logLines.length > 6) agent.logLines.pop();
  const logEl = document.getElementById(`log-${agent.id}`);
  if (logEl) {
    logEl.innerHTML = agent.logLines.map((l,i) =>
      `<div class="log-line ${i===0?'new':''}">${i===0?'> ':''} ${l}</div>`
    ).join('');
  }
}

function updateAgentCard(agent) {
  const card = document.getElementById(`card-${agent.id}`);
  if (!card) return;
  const s = STATES[agent.state];
  const badge = card.querySelector('.state-badge');
  badge.textContent = s.label;
  badge.style.background = s.bg;
  badge.style.color = s.text;
  card.querySelectorAll('.state-btn').forEach(b => {
    b.classList.toggle('active-btn', b.dataset.state === agent.state);
  });
}

function renderGrid() {
  const grid = document.getElementById('agentsGrid');
  grid.innerHTML = '';
  agents.forEach(agent => {
    const card = document.createElement('div');
    card.className = 'agent-card active';
    card.id = `card-${agent.id}`;
    const s = STATES[agent.state];
    card.innerHTML = `
      <button class="remove-btn" onclick="removeAgent(${agent.id})" aria-label="Remove agent">×</button>
      <div class="agent-name">${agent.name}</div>
      <div class="state-badge" style="background:${s.bg};color:${s.text}">${s.label}</div>
      <div class="canvas-wrap">
        <canvas class="agent-canvas" id="canvas-${agent.id}" width="120" height="100"></canvas>
      </div>
      <div class="log-area"><div class="log-scroll" id="log-${agent.id}"></div></div>
      <div class="state-controls">
        ${Object.keys(STATES).map(st => `<button class="state-btn ${st===agent.state?'active-btn':''}" data-state="${st}" onclick="setAgentState(agents.find(a=>a.id===${agent.id}),'${st}')">${STATES[st].label}</button>`).join('')}
      </div>
    `;
    grid.appendChild(card);
    addLog(agent, agent.state);
  });
}

// ── Pixel art drawing ──────────────────────────────────────────────────────
const DPR = 2;

function getCtx(id) {
  const canvas = document.getElementById(`canvas-${id}`);
  if (!canvas) return null;
  if (!canvas._init) {
    canvas.width = 120 * DPR; canvas.height = 100 * DPR;
    canvas.style.width = '120px'; canvas.style.height = '100px';
    canvas._init = true;
  }
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  return ctx;
}

function px(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x*DPR, y*DPR, w*DPR, h*DPR);
}

function drawAgent(ctx, agent, t) {
  const W = 120, H = 100;
  ctx.clearRect(0, 0, W*DPR, H*DPR);

  const state = agent.state;
  const bounce = Math.sin(t * 0.08) * 1.5;
  const blink = (Math.floor(t / 40) % 8 === 0) ? 1 : 0;

  const bx = 48, by = 20 + (state==='coding'||state==='testing' ? 0 : Math.round(bounce));

  // body / torso
  const shirt = agent.shirt;
  px(ctx, bx, by+16, 24, 18, shirt);

  // arms
  if (state === 'coding' || state === 'testing') {
    const armBob = Math.floor(t/6)%2===0 ? 0 : 1;
    px(ctx, bx-5, by+16+armBob, 6, 4, agent.shirt);
    px(ctx, bx+23, by+16+(1-armBob), 6, 4, agent.shirt);
    px(ctx, bx-5, by+20+armBob, 5, 8, '#FDBCB4');
    px(ctx, bx+24, by+20+(1-armBob), 5, 8, '#FDBCB4');
  } else if (state === 'spawning') {
    // left arm down, right arm up holding phone
    px(ctx, bx-5, by+16, 5, 12, shirt);
    px(ctx, bx-5, by+28, 5, 6, '#FDBCB4');
    px(ctx, bx+23, by+12, 6, 14, shirt);
    px(ctx, bx+29, by+8, 5, 8, '#FDBCB4');
    // phone
    const pf = Math.floor(t/10)%4;
    px(ctx, bx+34, by+2+pf, 14, 20, '#1F2937');
    px(ctx, bx+36, by+4+pf, 10, 16, '#0F172A');
    px(ctx, bx+37, by+6+pf, 8, 12, '#38BDF8');
    // signal dots
    const sd = Math.floor(t/8)%3;
    ['#38BDF8','#10B981','#F59E0B'].forEach((c,i) => {
      px(ctx, bx+38+i*3, by+7+pf, 2, 2, i<=sd?c:'#374151');
    });
  } else if (state === 'reading') {
    // arms out holding document
    px(ctx, bx-8, by+18, 8, 4, shirt);
    px(ctx, bx+24, by+18, 8, 4, shirt);
    px(ctx, bx-8, by+22, 6, 8, '#FDBCB4');
    px(ctx, bx+26, by+22, 6, 8, '#FDBCB4');
    // book/doc
    px(ctx, bx-2, by+24, 28, 20, '#F3F4F6');
    px(ctx, bx-1, by+24, 1, 20, '#9CA3AF');
    for (let r=0;r<5;r++) { px(ctx, bx+2, by+27+r*3, 22, 1, '#D1D5DB'); }
    const rp = Math.floor(t/15)%3;
    px(ctx, bx+2, by+27+rp*3, 22, 1, '#374151');
  } else if (state === 'error') {
    // arms raised /o\
    const shake = Math.floor(t/3)%2===0?-1:1;
    px(ctx, bx-5+shake, by+14, 5, 8, shirt);
    px(ctx, bx+24-shake, by+14, 5, 8, shirt);
    px(ctx, bx-8+shake*2, by+8, 6, 8, '#FDBCB4');
    px(ctx, bx+26-shake*2, by+8, 6, 8, '#FDBCB4');
  } else {
    // default arms
    px(ctx, bx-5, by+16, 5, 12, shirt);
    px(ctx, bx+24, by+16, 5, 12, shirt);
    px(ctx, bx-5, by+28, 5, 6, '#FDBCB4');
    px(ctx, bx+24, by+28, 5, 6, '#FDBCB4');
  }

  // legs
  px(ctx, bx+4, by+34, 7, 14, '#1E3A5F');
  px(ctx, bx+13, by+34, 7, 14, '#1E3A5F');
  px(ctx, bx+3, by+46, 9, 6, '#1F2937');
  px(ctx, bx+12, by+46, 9, 6, '#1F2937');

  // head
  px(ctx, bx+4, by, 16, 16, '#FDBCB4');
  // hair
  px(ctx, bx+4, by, 16, 4, '#3C2A1E');
  px(ctx, bx+4, by+4, 3, 4, '#3C2A1E');
  px(ctx, bx+17, by+4, 3, 4, '#3C2A1E');
  // eyes
  if (!blink) {
    px(ctx, bx+7, by+8, 2, 2, '#1F2937');
    px(ctx, bx+15, by+8, 2, 2, '#1F2937');
  } else {
    px(ctx, bx+7, by+9, 3, 1, '#1F2937');
    px(ctx, bx+15, by+9, 3, 1, '#1F2937');
  }
  // mouth
  if (state === 'error') {
    px(ctx, bx+8, by+13, 8, 1, '#1F2937');
    px(ctx, bx+8, by+12, 1, 1, '#1F2937');
    px(ctx, bx+15, by+12, 1, 1, '#1F2937');
  } else if (state === 'coding' || state === 'testing') {
    px(ctx, bx+8, by+12, 8, 1, '#1F2937');
    px(ctx, bx+14, by+11, 1, 1, '#1F2937');
    px(ctx, bx+15, by+11, 1, 1, '#1F2937');
  } else {
    px(ctx, bx+9, by+12, 6, 1, '#1F2937');
    px(ctx, bx+8, by+11, 1, 1, '#1F2937');
    px(ctx, bx+15, by+11, 1, 1, '#1F2937');
  }

  // ── State overlays ──
  if (state === 'thinking') {
    // ? bubble
    const qp = 3 + Math.round(Math.sin(t*0.1)*2);
    px(ctx, bx+18, by-12-qp, 16, 14, '#F5F3FF');
    px(ctx, bx+18, by-13-qp, 14, 1, '#8B5CF6');
    px(ctx, bx+17, by-12-qp, 1, 12, '#8B5CF6');
    px(ctx, bx+33, by-12-qp, 1, 12, '#8B5CF6');
    px(ctx, bx+18, by-1-qp, 14, 1, '#8B5CF6');
    // question mark pixels
    const qx=bx+23, qy=by-10-qp;
    px(ctx,qx+1,qy,4,1,'#6366F1'); px(ctx,qx,qy+1,6,1,'#6366F1');
    px(ctx,qx+5,qy+2,1,2,'#6366F1'); px(ctx,qx+3,qy+3,3,1,'#6366F1');
    px(ctx,qx+2,qy+4,2,1,'#6366F1'); px(ctx,qx+2,qy+6,2,1,'#6366F1');
    // tail
    px(ctx,bx+20,by-2-qp,3,2,'#F5F3FF'); px(ctx,bx+19,by-1-qp,2,2,'#F5F3FF');
    px(ctx,bx+18,by-3-qp,1,1,'#8B5CF6'); px(ctx,bx+19,by-2-qp,1,1,'#8B5CF6'); px(ctx,bx+20,by-1-qp,1,1,'#8B5CF6');
    // ellipsis dots
    const ef = Math.floor(t/15)%4;
    [0,1,2].forEach(i=>{ px(ctx,bx+4+i*4,by-4,2,2,i<ef?'#8B5CF6':'#C4B5FD'); });
  }

  if (state === 'coding' || state === 'testing') {
    // keyboard
    const kby = by + 52;
    px(ctx, bx-10, kby, 44, 18, '#374151');
    px(ctx, bx-9, kby+1, 42, 16, '#4B5563');
    // keys
    for (let r=0;r<2;r++) for(let c=0;c<7;c++) {
      const kx=bx-8+c*6, ky=kby+2+r*7;
      px(ctx,kx,ky,5,5,'#6B7280');
    }
    // random key press
    const kp = Math.floor(t/4)%14;
    const kr=Math.floor(kp/7), kc=kp%7;
    px(ctx,bx-8+kc*6,kby+2+kr*7,5,5,'#9CA3AF');
    // screen above
    const sby = by - 14;
    px(ctx, bx-10, sby-22, 44, 22, '#0F172A');
    px(ctx, bx-9, sby-21, 42, 20, '#0F172A');
    // code lines scrolling
    const codeColors = ['#38BDF8','#10B981','#F59E0B','#A78BFA','#F472B6','#34D399'];
    const offset = Math.floor(t/3)%20;
    for (let row=0;row<4;row++) {
      const lineW = [18,28,14,22,16,30][(row+offset)%6];
      const cc = codeColors[(row+Math.floor(t/10))%codeColors.length];
      if (row < 4) px(ctx, bx-8, sby-20+row*5, lineW, 2, cc);
    }
  }

  if (state === 'reading') {
    // eyes tracking left-right
    const ep = Math.floor(t/20)%3;
    px(ctx, bx+7+ep, by+8, 2, 2, '#1F2937');
    px(ctx, bx+15+ep, by+8, 2, 2, '#1F2937');
  }

  if (state === 'spawning') {
    // text bubble near phone
    const tf = Math.floor(t/12)%3;
    const tx=bx+50, ty=by-4;
    px(ctx,tx,ty,20,12,'#E5E7EB');
    px(ctx,tx,ty,20,1,'#9CA3AF'); px(ctx,tx,ty+11,20,1,'#9CA3AF');
    px(ctx,tx,ty,1,12,'#9CA3AF'); px(ctx,tx+19,ty,1,12,'#9CA3AF');
    // typing dots
    [0,1,2].forEach(i=>px(ctx,tx+4+i*6,ty+4,3,3,i<tf?'#374151':'#9CA3AF'));
    px(ctx,tx,ty+12,4,3,'#E5E7EB');
    px(ctx,tx,ty+12,1,3,'#9CA3AF');
  }

  if (state === 'error') {
    // red X sparks
    const ef = Math.floor(t/5)%4;
    const ex=bx+5, ey=by-18;
    px(ctx,ex,ey,3,3,'#FEF2F2'); px(ctx,ex+8,ey,3,3,'#FEF2F2');
    px(ctx,ex+4,ey+4,3,3,'#EF4444');
    if(ef>0) { px(ctx,ex+1,ey-3,2,2,'#FCA5A5'); px(ctx,ex+10,ey-2,2,2,'#FCA5A5'); }
    if(ef>1) { px(ctx,ex-2,ey+2,2,2,'#FCA5A5'); px(ctx,ex+13,ey+3,2,2,'#FCA5A5'); }
    // !!
    px(ctx,bx+6,by-22,3,8,'#EF4444'); px(ctx,bx+6,by-12,3,3,'#EF4444');
    px(ctx,bx+11,by-22,3,8,'#EF4444'); px(ctx,bx+11,by-12,3,3,'#EF4444');
  }

  if (state === 'idle') {
    // Z Z Z floating
    const zp = t % 80;
    const zAlpha = zp < 40 ? zp/40 : (80-zp)/40;
    ctx.globalAlpha = Math.max(0, zAlpha);
    px(ctx, bx+22+Math.floor(zp/10), by-6-Math.floor(zp/8), 5, 4, '#9CA3AF');
    px(ctx, bx+26+Math.floor(zp/12), by-14-Math.floor(zp/10), 4, 3, '#D1D5DB');
    ctx.globalAlpha = 1;
  }

  if (state === 'testing') {
    // checkmark or X above head
    const tp = Math.floor(t/30)%2;
    if (tp===0) {
      px(ctx,bx+3,by-14,2,2,'#10B981'); px(ctx,bx+5,by-12,2,2,'#10B981');
      px(ctx,bx+7,by-10,2,2,'#10B981'); px(ctx,bx+9,by-12,2,2,'#10B981');
      px(ctx,bx+11,by-14,2,2,'#10B981'); px(ctx,bx+13,by-16,2,2,'#10B981');
    } else {
      px(ctx,bx+3,by-16,2,2,'#EF4444'); px(ctx,bx+5,by-14,2,2,'#EF4444');
      px(ctx,bx+7,by-12,2,2,'#EF4444'); px(ctx,bx+9,by-14,2,2,'#EF4444');
      px(ctx,bx+11,by-16,2,2,'#EF4444');
      px(ctx,bx+11,by-16,2,2,'#EF4444'); px(ctx,bx+9,by-12,2,2,'#EF4444');
      px(ctx,bx+5,by-16,2,2,'#EF4444'); px(ctx,bx+7,by-12,2,2,'#EF4444');
    }
  }
}

// ── Animation loop ──────────────────────────────────────────────────────────
let tick = 0;
function loop() {
  tick++;
  agents.forEach(agent => {
    const ctx = getCtx(agent.id);
    if (ctx) {
      const mode = window.AOC_AVATAR_MODE || 'pixel';
      const renderer = window.AOC_AVATARS && window.AOC_AVATARS[mode];
      if (renderer && typeof renderer.draw === 'function') renderer.draw(ctx, agent, tick);
      else drawAgent(ctx, agent, tick);
    }
    // auto-advance logs (demo mode only — live mode logs come from the bridge)
    if (!LIVE && tick % 90 === Math.abs(hashId(agent.id) * 17) % 90) {
      addLog(agent, agent.state);
    }
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Live bridge sync ─────────────────────────────────────────────────────────
// When served over HTTP (by bridge/server.js) we render REAL agents pushed to
// the bridge. When opened as a file:// we fall back to the simulated demo.
const LIVE = location.protocol.startsWith('http');

function hashId(id) {
  if (typeof id === 'number') return id;
  let h = 0; const s = String(id);
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function shirtFor(id) { return SHIRTS[hashId(id) % SHIRTS.length]; }

function syncFromServer(serverAgents) {
  const seen = new Set();
  let membershipChanged = false;

  serverAgents.forEach(sa => {
    seen.add(String(sa.id));
    let local = agents.find(a => String(a.id) === String(sa.id));
    if (!local) {
      local = {
        id: sa.id,
        name: sa.name || `agent-${sa.id}`,
        shirt: sa.shirt || shirtFor(sa.id),
        state: sa.state || 'idle',
        parentId: sa.parentId,
        logLines: [],
      };
      agents.push(local);
      membershipChanged = true;
    }
    // name can arrive after spawn
    if (sa.name && local.name !== sa.name) { local.name = sa.name; membershipChanged = true; }
    // adopt server-provided logs verbatim
    if (Array.isArray(sa.logLines)) local.logLines = sa.logLines.slice(0, 6);
    if (sa.state && sa.state !== local.state) {
      local.state = sa.state;
      // card may not exist yet if membership just changed; render handles it
    }
  });

  // remove agents that vanished from the server
  const before = agents.length;
  agents = agents.filter(a => seen.has(String(a.id)));
  if (agents.length !== before) membershipChanged = true;

  if (membershipChanged) {
    renderGrid();
    // renderGrid reseeds demo logs; restore server logs + states after
    agents.forEach(a => {
      const logEl = document.getElementById(`log-${a.id}`);
      if (logEl && a.logLines.length) {
        logEl.innerHTML = a.logLines.map((l, i) =>
          `<div class="log-line ${i === 0 ? 'new' : ''}">${i === 0 ? '> ' : ''} ${l}</div>`
        ).join('');
      }
      updateAgentCard(a);
    });
  } else {
    agents.forEach(a => {
      updateAgentCard(a);
      const logEl = document.getElementById(`log-${a.id}`);
      if (logEl && a.logLines.length) {
        logEl.innerHTML = a.logLines.map((l, i) =>
          `<div class="log-line ${i === 0 ? 'new' : ''}">${i === 0 ? '> ' : ''} ${l}</div>`
        ).join('');
      }
    });
  }
}

async function pollBridge() {
  try {
    const res = await fetch('/api/state', { cache: 'no-store' });
    const data = await res.json();
    syncFromServer(data.agents || []);
    setStatus(true);
  } catch (e) {
    setStatus(false);
  }
}

function setStatus(online) {
  const dot = document.querySelector('.dot');
  const title = document.querySelector('.top-bar-title');
  if (dot) dot.style.background = online ? '#10B981' : '#9CA3AF';
  if (title) title.lastChild.textContent = online
    ? ' Hivemind · Agent NOC — LIVE'
    : ' Hivemind · Agent NOC — connecting…';
}

// Avatar tier toggle (pixel art vs. abstract renderer from src/abstract-avatar.js)
window.AOC_AVATAR_MODE = window.AOC_AVATAR_MODE || 'pixel';
(function () {
  const bar = document.querySelector('.top-bar');
  if (!bar) return;
  const sel = document.createElement('select');
  sel.className = 'layout-select';
  sel.title = 'Avatar style';
  sel.innerHTML = '<option value="pixel">Pixel art</option><option value="abstract">Abstract</option><option value="gif">GIF</option>';
  sel.value = window.AOC_AVATAR_MODE;
  sel.addEventListener('change', () => { window.AOC_AVATAR_MODE = sel.value; });
  bar.appendChild(sel);
})();

if (LIVE) {
  // Hide the manual demo controls; the bridge drives everything now.
  document.body.classList.add('live');
  pollBridge();
  setInterval(pollBridge, 400);
} else {
  // ── Demo seed (file:// mode) ──
  spawnAgent();
  setTimeout(spawnAgent, 400);
  setTimeout(() => { const a = agents[1]; if (a) { a.state = 'coding'; updateAgentCard(a); } }, 1200);
}
</script>
